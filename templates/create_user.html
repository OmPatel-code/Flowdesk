{% extends 'base.html' %}
{% block title %}Create User — FlowDesk{% endblock %}
{% block page_title %}New User{% endblock %}
{% block content %}
<div class="ph"><div><h1>New User</h1><p>Create a new account</p></div><a href="/users" class="btn btn-g btn-sm">← Back</a></div>
<form method="POST" style="max-width:520px">
  <div class="fs">
    <div class="fst">Account Details</div>
    <div class="fg"><label>Username *</label><input type="text" name="username" class="fc" placeholder="letters, numbers, underscores" required></div>
    <div class="fg"><label>Email</label><input type="email" name="email" class="fc" placeholder="user@example.com"></div>
    <div class="fg"><label>Password *</label><input type="password" name="password" class="fc" placeholder="Min 12 chars" required></div>
    <div class="fg" style="margin-bottom:0"><label>Role</label>
      <select name="role" class="fc">{% for r in roles %}<option value="{{r}}">{{r}}</option>{% endfor %}</select>
    </div>
  </div>
  <div style="display:flex;gap:10px"><button type="submit" class="btn btn-p">Create User</button><a href="/users" class="btn btn-g">Cancel</a></div>
</form>
{% endblock %}
