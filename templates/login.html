<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sign in — FlowDesk</title>
<script>if(localStorage.getItem('fd-theme')==='dark')document.documentElement.classList.add('dark');</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;600;700&family=DM+Sans:opsz,wght@9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
:root{--bg:#f4f6f9;--sur:#ffffff;--bdr:#e2e6ed;--tx:#111827;--tx2:#4b5563;--tx3:#9ca3af;--ac:#6366f1;--ac2:#4f46e5;--acg:rgba(99,102,241,.12);--err:#dc2626;--fh:'Outfit',sans-serif;--fb:'DM Sans',sans-serif}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:15px}body{font-family:var(--fb);background:var(--bg);color:var(--tx);min-height:100vh;display:flex;align-items:center;justify-content:center;-webkit-font-smoothing:antialiased}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(99,102,241,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(99,102,241,.03) 1px,transparent 1px);background-size:44px 44px;pointer-events:none}
.orb{position:fixed;border-radius:50%;filter:blur(90px);pointer-events:none}
.o1{width:400px;height:400px;background:rgba(99,102,241,.08);top:-120px;left:-100px}
.o2{width:300px;height:300px;background:rgba(79,70,229,.06);bottom:-80px;right:-60px}
.wrap{position:relative;z-index:1;width:100%;max-width:408px;padding:20px}
.card{background:var(--sur);border:1px solid var(--bdr);border-radius:18px;padding:36px 38px;box-shadow:0 4px 24px rgba(0,0,0,.06),0 1px 4px rgba(0,0,0,.04)}
.hd{text-align:center;margin-bottom:30px}
.logo{width:42px;height:42px;border-radius:11px;background:linear-gradient(135deg,var(--ac2),#818cf8);display:flex;align-items:center;justify-content:center;margin:0 auto 14px}
.logo svg{width:20px;height:20px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
h1{font-family:var(--fh);font-size:1.45rem;font-weight:700;letter-spacing:-.03em;margin-bottom:5px}
.sub{color:var(--tx3);font-size:.84rem}
.fg{margin-bottom:14px}
label{display:block;font-size:.76rem;font-weight:600;color:var(--tx2);margin-bottom:5px;letter-spacing:.01em}
.iw{position:relative}
.iw svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);width:14px;height:14px;stroke:var(--tx3);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;pointer-events:none}
input{width:100%;padding:10px 12px 10px 34px;background:#f9fafb;border:1px solid var(--bdr);border-radius:9px;color:var(--tx);font-family:var(--fb);font-size:.9rem;outline:none;transition:border-color .13s,box-shadow .13s}
input:focus{border-color:var(--ac);box-shadow:0 0 0 3px var(--acg);background:#fff}
input::placeholder{color:var(--tx3)}
.btn{width:100%;padding:11px;border-radius:9px;background:linear-gradient(135deg,var(--ac2),#5b52f0);color:#fff;font-family:var(--fh);font-size:.95rem;font-weight:600;border:none;cursor:pointer;transition:all .18s;box-shadow:0 4px 16px rgba(79,70,229,.28);letter-spacing:.01em;margin-top:6px}
.btn:hover{transform:translateY(-1px);box-shadow:0 6px 22px rgba(79,70,229,.38)}
.btn:active{transform:translateY(0)}
.flash{padding:10px 13px;border-radius:8px;font-size:.84rem;margin-bottom:14px;border:1px solid;display:flex;align-items:flex-start;gap:9px}
.flash svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0;margin-top:1px}
.f-d{background:#fef2f2;border-color:#fecaca;color:#dc2626}
.f-w{background:#fffbeb;border-color:#fde68a;color:#d97706}
.f-s{background:#f0fdf4;border-color:#bbf7d0;color:#16a34a}
.foot{text-align:center;margin-top:20px;font-size:.76rem;color:var(--tx3)}
.foot b{color:var(--tx2);font-weight:500}
html.dark{--bg:#080c14;--sur:#131b2a;--bdr:#1e2d42;--tx:#e2e8f0;--tx2:#8fa3bd;--tx3:#4a6480;--acg:rgba(99,102,241,.18);--err:#f87171}
html.dark input{background:#0d1422}
html.dark input:focus{background:#0d1422}
html.dark .f-d{background:rgba(248,113,113,.08);border-color:rgba(248,113,113,.2);color:#f87171}
html.dark .f-w{background:rgba(251,191,36,.08);border-color:rgba(251,191,36,.2);color:#fbbf24}
html.dark .f-s{background:rgba(45,212,191,.08);border-color:rgba(45,212,191,.2);color:#2dd4bf}
</style>
</head>
<body>
<div class="o1 orb"></div><div class="o2 orb"></div>
<div class="wrap">
  <div class="card">
    <div class="hd">
      <div class="logo"><svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg></div>
      <h1>Welcome back</h1>
      <p class="sub">Sign in to your FlowDesk account</p>
    </div>
    {% for cat,msg in get_flashed_messages(with_categories=true) %}
    <div class="flash {% if cat=='danger' %}f-d{% elif cat=='warning' %}f-w{% else %}f-s{% endif %}">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>{{msg}}
    </div>
    {% endfor %}
    <form method="POST">
      <div class="fg">
        <label>Username</label>
        <div class="iw">
          <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          <input type="text" name="username" placeholder="Enter your username" autocomplete="username" required>
        </div>
      </div>
      <div class="fg">
        <label>Password</label>
        <div class="iw">
          <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <input type="password" name="password" placeholder="Enter your password" autocomplete="current-password" required>
        </div>
      </div>
      <button type="submit" class="btn">Sign in</button>
    </form>
    <div class="foot"><b>FlowDesk</b> &nbsp;·&nbsp; Workflow Management Platform</div>
  </div>
</div>
</body>
</html>
