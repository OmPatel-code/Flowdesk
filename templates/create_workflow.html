{% extends 'base.html' %}
{% block title %}Create Workflow — FlowDesk{% endblock %}
{% block page_title %}New Workflow{% endblock %}
{% block content %}
<div class="ph"><div><h1>New Workflow</h1><p>Fill in the details below</p></div><a href="/workflows" class="btn btn-g btn-sm">← Back</a></div>
<form method="POST" enctype="multipart/form-data" style="max-width:720px">
  <div class="fs">
    <div class="fst">Basic Information</div>
    <div class="fg"><label>Title *</label><input type="text" name="title" class="fc" placeholder="Enter workflow title" required></div>
    <div class="fg"><label>Description</label><textarea name="description" class="fc" placeholder="Describe what this workflow is about…"></textarea></div>
    <div class="fr">
      <div class="fg" style="margin-bottom:0"><label>Priority</label>
        <select name="priority" class="fc">{% for p in priorities %}<option value="{{p}}" {% if p=='Medium' %}selected{% endif %}>{{p}}</option>{% endfor %}</select>
      </div>
      <div class="fg" style="margin-bottom:0"><label>Category</label>
        <select name="category" class="fc"><option value="">— Select category —</option>{% for c in categories %}<option value="{{c}}">{{c}}</option>{% endfor %}</select>
      </div>
    </div>
  </div>
  <div class="fs">
    <div class="fst">Assignment & Timeline</div>
    <div class="fr">
      <div class="fg" style="margin-bottom:0"><label>Assign to</label>
        <select name="assigned_to" class="fc"><option value="">— Unassigned —</option>{% for u in users %}<option value="{{u.id}}">{{u.username}}{% if u.role=='Admin' %} (Admin){% endif %}</option>{% endfor %}</select>
      </div>
      <div class="fg" style="margin-bottom:0"><label>Due Date</label><input type="date" name="due_date" class="fc"></div>
    </div>
  </div>
  <div class="fs">
    <div class="fst">Attachment</div>
    <div class="fg" style="margin-bottom:0"><label>File (optional)</label><input type="file" name="attachment" class="fc" style="padding:7px 11px"></div>
  </div>
  <div style="display:flex;gap:10px">
    <button type="submit" class="btn btn-p">Create Workflow</button>
    <a href="/workflows" class="btn btn-g">Cancel</a>
  </div>
</form>
{% endblock %}
